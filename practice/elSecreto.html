<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Modo Secreto</title>

    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="../style/estilos.css">
    <link rel="stylesheet" href="../style/elSecreto.css">
</head>

<body>

    <header>
        <h1>El Modo Secreto</h1>
    </header>

    <main>
        <p id="mensaje">Este es un párrafo normal XD 😎. </p>
        <hr>
        <p id="mensaje2">Haz clic en el botón para descubrir el secreto.</p>
        <button onclick="activarSecreto()">Activar Modo Secreto</button>
    </main>

    <script>
        function activarSecreto() {
            document.body.style.backgroundColor = "black";
            document.getElementById("mensaje").textContent = "¡Has descubierto el secreto!";
            document.getElementById("mensaje").style.color = "white";
            document.getElementById("mensaje2").style.color = "white";
        }
    </script>

</body>

</html>
