<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="../style/cards.css">

    <title>Cards de Perfil</title>
</head>

<body>

    <header>
        <h1>⚡ Objetivo Visual ⚡</h1>
    </header>

    <main>
        <article class="card">
            <div class="card_avatar">
                <span role="img" aria-label="Estudiante con lentes">😐</span>
            </div>
            <div class="card_info">
                <h2 class="card_nombre">Estudiante Master</h2>
                <p class="card_rol">Web Developer Apprentice</p>
            </div>
            <button class="card_boton" type="button">
                Sígueme
            </button>
        </article>
    </main>

    <footer>
        <p>Proyecto MVP - Cards de Perfil</p>
    </footer>

</body>

</html>
