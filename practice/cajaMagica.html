<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Caja Mágica</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .caja {
            width: 200px;
            height: 200px;
            background-color: blue;
            border-radius: 50%;
            transition: all 0.8s;
        }

        .caja:hover {
            background-color: purple;
            transform: scale(1.2);
            box-shadow: 0px 10px 30px black;
        }
    </style>
</head>

<body>

    <div class="caja"></div>

</body>

</html>
